name: Build and Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libasound2-dev \
          libcurl4-openssl-dev \
          libx11-dev \
          libxext-dev \
          libfreetype6-dev \
          libfontconfig1-dev \
          pkg-config \
          libxinerama-dev \
          libxcursor-dev \
          mesa-common-dev \
          libgl1-mesa-dev \
          libxrandr-dev \
          libxcomposite-dev \
          libxi-dev \
          xvfb \
          ninja-build
        sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

    - name: Make Scripts Executable
      run: chmod +x build_linux.sh

    - name: Build
      run: ./build_linux.sh

    - name: Run Test with Screenshot
      run: |
        xvfb-run -a ./build/Orion --screenshot screenshot_linux.png
      timeout-minutes: 5

    - name: Upload Screenshot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshot-linux
        path: screenshot_linux.png

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Make Scripts Executable
      run: chmod +x build_macos.sh

    - name: Build
      run: ./build_macos.sh

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      shell: cmd
      run: build_windows.bat
